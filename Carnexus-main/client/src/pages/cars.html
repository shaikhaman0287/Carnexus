<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarNexus | Cars & Vehicles</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body data-theme="dark">

<!-- Booking Modal (shared component) -->
<div class="modal-overlay" id="booking-modal">
    <div class="modal-box" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:500px;animation:slideIn 0.2s ease;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h2 style="margin:0;">Book a Vehicle</h2>
            <button onclick="closeBookingModal()" style="background:none;border:none;cursor:pointer;color:var(--text-dim);"><i data-lucide="x" style="width:22px;height:22px;"></i></button>
        </div>
        <div id="modal-car-info" style="background:var(--bg-glass);border-radius:10px;padding:16px;margin-bottom:24px;display:flex;gap:12px;align-items:center;">
            <img id="modal-car-img" src="" style="width:64px;height:48px;object-fit:cover;border-radius:6px;" onerror="this.src='../assets/images/car1.png'">
            <div>
                <div id="modal-car-name" style="font-weight:700;"></div>
                <div id="modal-car-price" style="color:var(--primary);font-size:0.9rem;"></div>
            </div>
        </div>
        <div class="form-grid" style="grid-template-columns:1fr;">
            <div class="form-group"><label>Your Name</label><input type="text" id="booking-name" placeholder="Full Name"></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="booking-phone" placeholder="+91 9876543210"></div>
            <div class="form-group"><label>Preferred Date *</label><input type="date" id="booking-date" required></div>
        </div>
        <input type="hidden" id="booking-car-id">
        <div style="display:flex;gap:12px;margin-top:8px;">
            <button class="btn btn-secondary" onclick="closeBookingModal()" style="flex:1;">Cancel</button>
            <button class="btn btn-primary" onclick="submitBooking()" id="confirm-booking-btn" style="flex:2;"><i data-lucide="calendar-check" style="width:16px;"></i> Confirm Booking</button>
        </div>
    </div>
</div>

<!-- Car Details Modal -->
<div class="modal-overlay" id="details-modal">
    <div class="modal-box" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:24px;padding:0;width:95%;max-width:850px;animation:slideIn 0.2s ease;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
        <div style="position:relative;height:300px;">
            <img id="details-car-img" src="" style="width:100%;height:100%;object-fit:cover;">
            <button onclick="closeDetailsModal()" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.5);border:none;cursor:pointer;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
            <div id="details-car-status" style="position:absolute;bottom:20px;left:20px;" class="car-status"></div>
        </div>
        <div style="padding:40px;overflow-y:auto;flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;">
                <div>
                    <div id="details-car-brand" style="color:var(--primary);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:0.9rem;margin-bottom:8px;"></div>
                    <h1 id="details-car-name" style="margin:0;font-size:2.5rem;"></h1>
                </div>
                <div id="details-car-price" style="font-size:2rem;font-weight:800;color:var(--primary);"></div>
            </div>

            <div class="specs-grid" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));gap:20px;margin-bottom:40px;padding:30px;background:var(--bg-glass);border-radius:20px;border:1px solid var(--border);">
                <div class="spec-item">
                    <div style="color:var(--text-dim);font-size:0.8rem;margin-bottom:5px;">Year</div>
                    <div id="details-spec-year" style="font-weight:700;font-size:1.1rem;"></div>
                </div>
                <div class="spec-item">
                    <div style="color:var(--text-dim);font-size:0.8rem;margin-bottom:5px;">Fuel Type</div>
                    <div id="details-spec-fuel" style="font-weight:700;font-size:1.1rem;"></div>
                </div>
                <div class="spec-item">
                    <div style="color:var(--text-dim);font-size:0.8rem;margin-bottom:5px;">Transmission</div>
                    <div id="details-spec-trans" style="font-weight:700;font-size:1.1rem;"></div>
                </div>
                <div class="spec-item">
                    <div style="color:var(--text-dim);font-size:0.8rem;margin-bottom:5px;">Mileage</div>
                    <div id="details-spec-mileage" style="font-weight:700;font-size:1.1rem;"></div>
                </div>
            </div>

            <div id="details-actions" style="display:flex;gap:15px;">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>
</div>
<style>
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.booking-status-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;text-transform:capitalize;}
</style>

<div class="app-container">
        <header class="top-header">
            <a href="index.html" class="logo-container">
                <img src="../assets/images/logo.png" alt="CarNexus Logo">
                <span>CARNEXUS</span>
            </a>

            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search inventory (₹)...">
            </div>

            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Home</a>
                <a href="cars.html" class="nav-item active">Cars</a>
                <a href="add-car.html" class="nav-item">Add Car</a>
                <a href="manage-cars.html" class="nav-item">Manage</a>
                <a href="bookings.html" class="nav-item">Bookings</a>
                <a href="customers.html" class="nav-item">Customers</a>
                <a href="reports.html" class="nav-item">Reports</a>
                <a href="contact.html" class="nav-item">Contact</a>
                <a href="login.html" class="nav-item">Login</a>
                <a href="admin.html" class="nav-item">Admin Panel</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="header-flex" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1>Available Inventory</h1>
                <div class="filters" style="display: flex; gap: 15px;">
                    <select class="form-select"><option>Brand: All</option><option>Mercedes</option><option>BMW</option><option>Audi</option></select>
                    <select class="form-select"><option>Status: All</option><option>Available</option><option>Sold</option></select>
                    <button class="btn btn-primary"><i data-lucide="filter"></i> Filter</button>
                </div>
            </div>
            
            <div class="car-grid" id="car-list-grid">
                <!-- Data from app.js will be injected here -->
            </div>
        </main>

        <footer style="padding: 40px 5%; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim);">
            <p>&copy; 2024 CarNexus Premium. All rights reserved.</p>
        </footer>
    </div>

    <script src="../services/app.js"></script>
    <script>
        lucide.createIcons();
        // Since it's a separate page, we trigger the specific render
        if (typeof renderCarList === 'function') {
            renderCarList();
        }
    </script>
</body>
</html>
