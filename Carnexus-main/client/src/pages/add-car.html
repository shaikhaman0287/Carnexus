<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarNexus | Add New Car</title>
    <meta name="description" content="Add a new vehicle to the CarNexus inventory system.">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body data-theme="dark">
    <div class="app-container">
        <header class="top-header">
            <a href="index.html" class="logo-container">
                <img src="../assets/images/logo.png" alt="CarNexus Logo">
                <span>CARNEXUS</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Home</a>
                <a href="cars.html" class="nav-item">Cars</a>
                <a href="add-car.html" class="nav-item active">Add Car</a>
                <a href="manage-cars.html" class="nav-item">Manage</a>
                <a href="bookings.html" class="nav-item">Bookings</a>
                <a href="customers.html" class="nav-item">Customers</a>
                <a href="reports.html" class="nav-item">Reports</a>
                <a href="contact.html" class="nav-item">Contact</a>
                <a href="login.html" class="nav-item">Login</a>
                <a href="admin.html" class="nav-item">Admin Panel</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="glass-panel" style="max-width: 900px; margin: 0 auto; padding: 40px;">
                <h1 style="margin-bottom: 10px;">Add New Vehicle</h1>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Fill in the details to list a new car in the inventory.</p>
                
                <form class="form-grid" id="add-car-form">
                    <div class="form-group">
                        <label>Car Name / Model *</label>
                        <input type="text" id="car-name" placeholder="e.g. BMW M5 CS" required>
                    </div>
                    <div class="form-group">
                        <label>Brand *</label>
                        <input type="text" id="car-brand" placeholder="e.g. BMW" required>
                    </div>
                    <div class="form-group">
                        <label>Price *</label>
                        <input type="text" id="car-price" placeholder="e.g. ₹10.99 Lakh or ₹5 Lakhs" required>
                    </div>
                    <div class="form-group">
                        <label>Year *</label>
                        <input type="number" id="car-year" placeholder="2024" min="2000" max="2030" required>
                    </div>
                    <div class="form-group">
                        <label>Fuel Type</label>
                        <select id="car-fuel">
                            <option>Petrol</option>
                            <option>Diesel</option>
                            <option>Electric</option>
                            <option>Hybrid</option>
                            <option>CNG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Transmission</label>
                        <select id="car-trans">
                            <option>Manual</option>
                            <option>Automatic</option>
                            <option>AMT</option>
                            <option>CVT</option>
                            <option>DCT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mileage</label>
                        <input type="text" id="car-mileage" placeholder="e.g. 22 kmpl">
                    </div>
                    <div class="form-group">
                        <label>Car Image Path</label>
                        <input type="text" id="car-image" placeholder="../assets/images/car1.png">
                    </div>
                    <div class="form-group full-width" style="margin-top: 10px;">
                        <button class="btn btn-primary btn-lg" type="button" onclick="window.handleAddCar()" id="add-car-btn" style="width: 100%; padding: 15px;">
                            <i data-lucide="plus-circle" style="width:18px;"></i> Add to Inventory
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <footer style="padding: 40px 5%; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim);">
            <p>&copy; 2024 CarNexus Premium. All rights reserved.</p>
        </footer>
    </div>

    <script src="../services/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
