<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarNexus | Login & Register</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body data-theme="dark">
    <div class="app-container" style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('../assets/images/hero_bg.png'); background-size: cover; background-position: center; min-height: 100vh; justify-content: center; align-items: center;">
        
        <div class="auth-container glass-panel" style="width: 100%; max-width: 450px; padding: 50px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <img src="../assets/images/logo.png" style="height: 60px; margin-bottom: 15px;">
                <h1 style="font-size: 2rem;">Welcome Back</h1>
                <p style="color: var(--text-dim);">Enter your credentials to access your account</p>
            </div>

            <form class="form-grid" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="emailUser" placeholder="admin@carnexus.com" value="admin@carnexus.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passwordUser" placeholder="••••••••" value="admin">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin: 10px 0;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary); text-decoration: none;">Forgot password?</a>
                </div>
                <button class="btn btn-primary btn-lg" type="button" onclick="window.handleLogin()" id="login-btn" style="width: 100%; padding: 15px;">Sign In</button>
                
                <p style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim);">
                    Standard User Testing? <br> <span style="color: var(--primary); font-weight: 600; cursor: pointer;" onclick="document.getElementById('emailUser').value='user@example.com'; document.getElementById('passwordUser').value='user';">Click here to auto-fill User Credentials</span>
                </p>
            </form>

            <div style="margin-top: 40px; text-align: center;">
                <a href="index.html" style="color: var(--text-dim); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem;">
                    <i data-lucide="arrow-left" style="width: 16px;"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="../services/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
